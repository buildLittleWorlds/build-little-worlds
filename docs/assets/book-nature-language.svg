<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">Book of Nature and Book of Language</title>
  <desc id="desc">A restrained line diagram connecting mathematical order in nature with mathematical order in language.</desc>
  <rect width="720" height="520" fill="#ffffff"/>
  <rect x="48" y="72" width="248" height="320" rx="8" fill="#edf3ef" stroke="#d8dfd9" stroke-width="2"/>
  <rect x="424" y="72" width="248" height="320" rx="8" fill="#f4eff2" stroke="#d8dfd9" stroke-width="2"/>
  <line x1="172" y1="112" x2="172" y2="352" stroke="#315b72" stroke-width="2"/>
  <path d="M92 310 C126 210, 154 240, 172 166 C198 254, 228 188, 258 126" fill="none" stroke="#315b72" stroke-width="4" stroke-linecap="round"/>
  <circle cx="126" cy="210" r="6" fill="#9a762b"/>
  <circle cx="172" cy="166" r="6" fill="#9a762b"/>
  <circle cx="228" cy="188" r="6" fill="#9a762b"/>
  <path d="M90 342 H258" stroke="#315b72" stroke-width="2" stroke-linecap="round"/>
  <text x="172" y="428" fill="#1f2524" font-family="Georgia, serif" font-size="26" text-anchor="middle">Nature</text>
  <text x="172" y="460" fill="#5f6a67" font-family="Arial, sans-serif" font-size="15" text-anchor="middle">matter, motion, law</text>
  <g fill="none" stroke="#7b3f5c" stroke-width="2">
    <circle cx="488" cy="150" r="24"/>
    <circle cx="560" cy="132" r="24"/>
    <circle cx="606" cy="210" r="24"/>
    <circle cx="514" cy="252" r="24"/>
    <circle cx="590" cy="306" r="24"/>
    <path d="M511 144 L537 138"/>
    <path d="M576 152 L594 190"/>
    <path d="M586 220 L535 242"/>
    <path d="M531 266 L570 292"/>
    <path d="M500 173 L512 228"/>
  </g>
  <g fill="#7b3f5c" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">
    <text x="488" y="155">word</text>
    <text x="560" y="137">tone</text>
    <text x="606" y="215">genre</text>
    <text x="514" y="257">image</text>
    <text x="590" y="311">logic</text>
  </g>
  <text x="548" y="428" fill="#1f2524" font-family="Georgia, serif" font-size="26" text-anchor="middle">Language</text>
  <text x="548" y="460" fill="#5f6a67" font-family="Arial, sans-serif" font-size="15" text-anchor="middle">meaning, relation, form</text>
  <path d="M304 230 C344 190, 376 190, 416 230" fill="none" stroke="#9a762b" stroke-width="3" stroke-linecap="round"/>
  <path d="M410 218 L424 230 L410 242" fill="none" stroke="#9a762b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M416 270 C376 310, 344 310, 304 270" fill="none" stroke="#9a762b" stroke-width="3" stroke-linecap="round"/>
  <path d="M310 282 L296 270 L310 258" fill="none" stroke="#9a762b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="360" cy="250" r="54" fill="#ffffff" stroke="#d8dfd9" stroke-width="2"/>
  <text x="360" y="244" fill="#1f2524" font-family="Georgia, serif" font-size="24" text-anchor="middle">Order</text>
  <text x="360" y="270" fill="#5f6a67" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">mathematical</text>

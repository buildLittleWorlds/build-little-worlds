<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">Little Worlds and Large Orders</title>
  <desc id="desc">A restrained diagram connecting small bounded forms with larger orders through abstraction and scale.</desc>
  <rect width="720" height="520" fill="#ffffff"/>
  <rect x="48" y="78" width="250" height="316" rx="8" fill="#edf3ef" stroke="#d8dfd9" stroke-width="2"/>
  <rect x="422" y="78" width="250" height="316" rx="8" fill="#f4eff2" stroke="#d8dfd9" stroke-width="2"/>
  <text x="173" y="126" fill="#1f2524" font-family="Georgia, serif" font-size="28" text-anchor="middle">Little Forms</text>
  <text x="547" y="126" fill="#1f2524" font-family="Georgia, serif" font-size="28" text-anchor="middle">Large Orders</text>
  <g fill="#315b72" font-family="Arial, sans-serif" font-size="17">
    <text x="92" y="176">token</text>
    <text x="92" y="216">word</text>
    <text x="92" y="256">equation</text>
    <text x="92" y="296">prime</text>
    <text x="92" y="336">parable</text>
  </g>
  <g fill="none" stroke="#315b72" stroke-width="2">
    <circle cx="230" cy="170" r="13"/>
    <rect x="218" y="204" width="24" height="24" rx="4"/>
    <path d="M218 260 H242 M230 248 V272"/>
    <circle cx="230" cy="296" r="13"/>
    <path d="M218 336 C226 320, 236 320, 244 336" stroke-linecap="round"/>
  </g>
  <g fill="#7b3f5c" font-family="Arial, sans-serif" font-size="17">
    <text x="466" y="176">language</text>
    <text x="466" y="216">creation</text>
    <text x="466" y="256">culture</text>
    <text x="466" y="296">reason</text>
    <text x="466" y="336">Logos</text>
  </g>
  <g fill="none" stroke="#7b3f5c" stroke-width="2">
    <circle cx="610" cy="176" r="19"/>
    <circle cx="582" cy="232" r="15"/>
    <circle cx="626" cy="256" r="15"/>
    <circle cx="590" cy="318" r="17"/>
    <path d="M596 187 L586 218"/>
    <path d="M596 239 L612 249"/>
    <path d="M618 271 L598 304"/>
  </g>
  <path d="M308 214 C340 174, 380 174, 412 214" fill="none" stroke="#9a762b" stroke-width="3" stroke-linecap="round"/>
  <path d="M400 202 L414 214 L400 226" fill="none" stroke="#9a762b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="360" y="188" fill="#9a762b" font-family="Arial, sans-serif" font-size="15" text-anchor="middle">abstraction</text>
  <path d="M412 302 C380 342, 340 342, 308 302" fill="none" stroke="#9a762b" stroke-width="3" stroke-linecap="round"/>
  <path d="M320 314 L306 302 L320 290" fill="none" stroke="#9a762b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="360" y="360" fill="#9a762b" font-family="Arial, sans-serif" font-size="15" text-anchor="middle">scale</text>
  <circle cx="360" cy="258" r="58" fill="#ffffff" stroke="#d8dfd9" stroke-width="2"/>
  <text x="360" y="252" fill="#1f2524" font-family="Georgia, serif" font-size="24" text-anchor="middle">Microcosm</text>
  <text x="360" y="278" fill="#5f6a67" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">and macrocosm</text>
  <text x="173" y="438" fill="#5f6a67" font-family="Arial, sans-serif" font-size="15" text-anchor="middle">bounded enough to see</text>
  <text x="547" y="438" fill="#5f6a67" font-family="Arial, sans-serif" font-size="15" text-anchor="middle">large enough to wonder</text>
</svg>

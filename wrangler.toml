name = "build-little-worlds-api"
main = "worker/src/index.js"
compatibility_date = "2026-06-19"
workers_dev = true
preview_urls = true

[vars]
ALLOWED_ORIGINS = "https://www.buildlittleworlds.com,https://buildlittleworlds.com,http://localhost:8000,http://127.0.0.1:8000,http://localhost:8787,http://127.0.0.1:8787"
RATE_LIMIT_PER_HOUR = "30"

# Set these as encrypted Cloudflare secrets, not plaintext vars:
# wrangler secret put BLW_ACCESS_TOKEN
# wrangler secret put GEMINI_API_KEY
# wrangler secret put HF_TOKEN
